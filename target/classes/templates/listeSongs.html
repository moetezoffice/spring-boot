<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<link rel="stylesheet" type="text/css"
      href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
    <meta charset="utf-8">
    <title>Liste des Musiques</title>
</head>
<body>
<div th:replace="template"></div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>Liste des Musiques</strong>
            <a sec:authorize="hasAnyAuthority('ADMIN','AGENT')"
               th:href="@{/showCreate}" class="btn btn-sm btn-success">+ Ajouter</a>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Prix (DT)</th>
                    <th>Date</th>
                    <th>Catégorie</th>
                    <th sec:authorize="hasAnyAuthority('ADMIN','AGENT')">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${songs.content}">
                    <td th:text="${p.idSong}"></td>
                    <td th:text="${p.nomSong}"></td>
                    <td th:text="${p.prixSong}"></td>
                    <td th:text="${#dates.format(p.dateCreation,'dd/MM/yyyy')}"></td>
                    <td>
                        <span th:if="${p.categorie != null}" th:text="${p.categorie.nomCat}"
                              class="badge badge-secondary"></span>
                        <span th:if="${p.categorie == null}" class="text-muted">—</span>
                    </td>
                    <td sec:authorize="hasAnyAuthority('ADMIN','AGENT')">
                        <!-- Edit button: ADMIN and AGENT -->
                        <a class="btn btn-sm btn-success"
                           th:href="@{/modifierSong(id=${p.idSong}, page=${currentPage}, size=${size})}">
                            Éditer
                        </a>
                        <!-- Delete button: ADMIN only -->
                        <a sec:authorize="hasAuthority('ADMIN')"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Êtes-vous sûr de vouloir supprimer ?')"
                           th:href="@{/supprimerSong(id=${p.idSong}, page=${currentPage}, size=${size})}">
                            Supprimer
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <ul class="nav nav-pills">
                <li th:each="page, status : ${pages}">
                    <a th:class="${status.index == currentPage ? 'btn btn-primary mr-1' : 'btn btn-outline-primary mr-1'}"
                       th:href="@{/ListeSongs(page=${status.index}, size=${size})}"
                       th:text="${status.index + 1}">
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
